services:
  backend:
    build:
      context: ./backend
    env_file:
      - path: ./backend/.env
        required: true
    environment:
      FORMS_STORE_PATH: /app/data/forms.json
      DOCS_STORE_PATH: /app/data/docs.json
      UPLOADS_PATH: /app/data/uploads
    volumes:
      - backend-data:/app/data
      - ./backend/.creditials.json:/app/.creditials.json:ro
    restart: unless-stopped
    networks:
      - app-net

  frontend:
    build:
      context: ./frontend
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - app-net

  caddy:
    image: caddy:2-alpine
    env_file:
      - ./deploy/.env.production
    depends_on:
      - frontend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    restart: unless-stopped
    networks:
      - app-net

volumes:
  backend-data:
  caddy-data:
  caddy-config:

networks:
  app-net:
    ipam:
      config:
        - subnet: 172.30.0.0/24
